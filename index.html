<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincroTask | TICS Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b1120; color: #f1f5f9; overflow-x: hidden; }
        .fancy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.15) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(168, 85, 247, 0.15) 0px, transparent 50%); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.04); }
        
        /* NUEVA ANIMACIÓN: FLOATING GLOW */
        .logo-floating {
            animation: floatingGlow 5s ease-in-out infinite;
        }

        @keyframes floatingGlow {
            0% { 
                transform: translateY(0px) rotate(0deg); 
                filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.2));
            }
            50% { 
                transform: translateY(-15px) rotate(1deg); 
                filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.6));
            }
            100% { 
                transform: translateY(0px) rotate(0deg); 
                filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.2));
            }
        }

        #auth-screen { transition: all 0.6s ease; }
        .auth-hidden { transform: translateY(-100vh); opacity: 0; }
        #app-screen { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .app-visible { display: flex !important; opacity: 1 !important; }
    </style>
</head>
<body class="min-h-screen">
    <div class="fancy-bg"></div>

    <audio id="soundLogin" src="assets/login.mp3" preload="auto"></audio>
    <audio id="soundTaskDone" src="assets/task_done.mp3" preload="auto"></audio>

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl border-white/10 animate__animated animate__fadeIn">
            <div class="text-center mb-8">
                
                <div class="h-80 w-80 mx-auto mb-6 flex items-center justify-center logo-floating">
                    <img id="loginPhoto" src="assets/logo_tics.jpeg" alt="Logo TICS" 
                         class="max-w-full max-h-full object-contain rounded-2xl">
                </div>
                
                <h1 class="text-4xl font-black text-white tracking-tighter">Jesús <span class="text-blue-500">Workspace</span></h1>
                <p class="text-gray-400 mt-2 font-medium">TICS Advanced System v2.0</p>
            </div>
            
            <form onsubmit="window.handleLogin(event)" class="space-y-5">
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                    <input type="text" id="loginUser" required placeholder="Usuario" class="w-full pl-12 pr-4 py-4 bg-black/20 border border-white/10 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                    <input type="password" id="loginPassword" required placeholder="Contraseña" class="w-full pl-12 pr-4 py-4 bg-black/20 border border-white/10 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all shadow-lg shadow-blue-600/30 active:scale-95">
                    Acceder al Sistema
                </button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="h-screen w-full flex overflow-hidden">
        <main class="flex-1 flex flex-col glass-dark">
            <header class="h-20 border-b border-white/5 px-10 flex items-center justify-between">
                <h2 class="text-xl font-bold">Dashboard</h2>
                <img src="assets/logo_tics.jpeg" class="h-10 w-10 rounded-lg object-contain border border-white/10">
            </header>
            <div class="p-10">
                <h2 class="text-3xl font-bold">Bienvenido, Jesús</h2>
                </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        
        window.handleLogin = function(e) {
            e.preventDefault();
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPassword').value;

            if(u === "Jesús Sánchez" && p === "Jose-san") {
                document.getElementById('soundLogin').play().catch(() => {});
                document.getElementById('auth-screen').classList.add('auth-hidden');
                setTimeout(() => {
                    document.getElementById('app-screen').classList.add('app-visible');
                }, 500);
            } else {
                alert("Datos incorrectos");
            }
        };
    </script>
</body>
</html>
