<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincroTask Pro | TICS Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --accent: #3b82f6; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: #f1f5f9; 
            overflow-x: hidden; 
        }

        /* Fondo Animado */
        .fancy-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        /* Efectos de Cristal */
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Animación del Logo */
        .logo-container {
            animation: floating 6s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.4));
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Estilos de Tarea */
        .task-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
        }
        .task-card:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(10px);
            border-left: 4px solid var(--accent);
        }

        #auth-screen { transition: all 1s ease; }
        .auth-hidden { transform: scale(1.1) translateY(-100vh); opacity: 0; pointer-events: none; }
        .app-hidden { display: none; opacity: 0; }
        .app-visible { display: flex !important; animation: fadeIn 1s forwards; }
    </style>
</head>
<body>
    <div class="fancy-bg"></div>

    <audio id="soundLogin" src="assets/login.mp3" preload="auto"></audio>
    <audio id="soundTaskDone" src="assets/task_done.mp3" preload="auto"></audio>

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="glass w-full max-w-lg rounded-[3.5rem] p-12 text-center animate__animated animate__zoomIn">
            <div class="logo-container mb-10 flex justify-center">
                <img src="assets/logo_tics.jpeg" class="h-64 w-64 object-contain rounded-[2.5rem] shadow-2xl">
            </div>
            
            <h1 class="text-4xl font-black mb-2">Jesús <span class="text-blue-500">Workspace</span></h1>
            <p class="text-gray-400 mb-10 font-medium">Panel de Control Inteligente</p>

            <form onsubmit="handleLogin(event)" class="space-y-4" novalidate>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-blue-500"></i>
                    <input type="text" id="loginUser" required placeholder="Usuario de TICS" autocomplete="off"
                        class="w-full pl-14 pr-6 py-5 bg-black/40 border border-white/10 rounded-2xl text-white focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-blue-500"></i>
                    <input type="password" id="loginPassword" required placeholder="Contraseña segura"
                        class="w-full pl-14 pr-6 py-5 bg-black/40 border border-white/10 rounded-2xl text-white focus:border-blue-500 outline-none transition-all">
                </div>
                <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl shadow-xl shadow-blue-900/40 active:scale-95 transition-all">
                    AUTENTICAR SISTEMA
                </button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="app-hidden h-screen w-full flex overflow-hidden">
        <aside class="w-80 glass border-r-0 flex flex-col p-8 m-4 rounded-[2.5rem]">
            <div class="flex items-center gap-4 mb-12">
                <div class="h-12 w-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><i data-lucide="zap" class="text-white"></i></div>
                <span class="text-2xl font-black">SincroTask</span>
            </div>
            <nav class="space-y-2 flex-1">
                <div class="p-4 bg-blue-600/10 text-blue-400 rounded-2xl flex items-center gap-4 font-bold border border-blue-500/20">
                    <i data-lucide="layout"></i> Dashboard
                </div>
            </nav>
            <button onclick="location.reload()" class="flex items-center gap-4 p-4 text-red-400 font-bold hover:bg-red-500/10 rounded-2xl transition-all">
                <i data-lucide="power"></i> Cerrar Sesión
            </button>
        </aside>

        <main class="flex-1 overflow-y-auto p-12">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h2 class="text-3xl font-black">Bienvenido de nuevo, Jesús</h2>
                    <p class="text-gray-400">Aquí está el resumen de tus objetivos actuales.</p>
                </div>
                <div class="flex items-center gap-4 glass p-2 pr-6 rounded-2xl">
                    <img src="assets/logo_tics.jpeg" class="h-12 w-12 rounded-xl object-contain">
                    <span class="font-bold">TICS Specialist</span>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                <div class="glass p-8 rounded-[2.5rem]">
                    <p class="text-xs font-black text-blue-500 uppercase tracking-widest mb-2">Pendientes</p>
                    <h3 id="statPending" class="text-5xl font-black">0</h3>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <p class="text-xs font-black text-green-500 uppercase tracking-widest mb-2">Completadas</p>
                    <h3 id="statDone" class="text-5xl font-black">0</h3>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <p class="text-xs font-black text-purple-500 uppercase tracking-widest mb-2">Rendimiento</p>
                    <h3 id="statEfficiency" class="text-5xl font-black">0%</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="glass p-8 rounded-[2.5rem] h-fit">
                    <h4 class="text-xl font-bold mb-6">Nuevo Objetivo</h4>
                    <textarea id="taskInput" placeholder="Escribe tu siguiente meta..." class="w-full p-6 bg-black/40 border border-white/10 rounded-3xl text-white outline-none focus:border-blue-500 h-40 resize-none transition-all mb-4"></textarea>
                    <button onclick="addTask()" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:bg-gray-200 transition-all">AÑADIR TAREA</button>
                </div>

                <div class="lg:col-span-2 space-y-4" id="taskList">
                    </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGh_Pesf7zkQF5yle0Jhd6lapZod06bnE",
            authDomain: "pendientes-jose.firebaseapp.com",
            projectId: "pendientes-jose",
            storageBucket: "pendientes-jose.firebasestorage.app",
            messagingSenderId: "36052420213",
            appId: "1:36052420213:web:b8dac50761aed5feec3d2c",
            databaseURL: "https://pendientes-jose-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tareas');

        onValue(tasksRef, (snapshot) => {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            const tasks = snapshot.val() || {};
            let p = 0, d = 0;

            Object.keys(tasks).reverse().forEach(id => {
                const task = tasks[id];
                task.done ? d++ : p++;
                const card = document.createElement('div');
                card.className = `task-card glass p-6 rounded-3xl flex items-center justify-between ${task.done ? 'opacity-30' : ''}`;
                card.innerHTML = `
                    <div class="flex items-center gap-6">
                        <button onclick="toggleTask('${id}', ${task.done})" class="w-10 h-10 rounded-xl border-2 border-white/10 flex items-center justify-center transition-all ${task.done ? 'bg-blue-600 border-blue-600' : 'hover:border-blue-500'}">
                            ${task.done ? '<i data-lucide="check" class="text-white"></i>' : ''}
                        </button>
                        <span class="text-xl font-bold ${task.done ? 'line-through' : ''}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask('${id}')" class="p-3 text-red-500 hover:bg-red-500/10 rounded-xl transition-all"><i data-lucide="trash-2"></i></button>
                `;
                list.appendChild(card);
            });

            document.getElementById('statPending').innerText = p;
            document.getElementById('statDone').innerText = d;
            document.getElementById('statEfficiency').innerText = (p + d) === 0 ? "0%" : Math.round((d / (p + d)) * 100) + "%";
            lucide.createIcons();
        });

        window.addTask = () => {
            const input = document.getElementById('taskInput');
            if(input.value.trim()) push(tasksRef, { text: input.value, done: false });
            input.value = "";
        };

        window.toggleTask = (id, status) => {
            if(!status) document.getElementById('soundTaskDone').play().catch(() => {});
            update(ref(db, `tareas/${id}`), { done: !status });
        };

        window.deleteTask = (id) => remove(ref(db, `tareas/${id}`));
    </script>

    <script>
        lucide.createIcons();
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPassword').value;

            if(u === "Jesús Sánchez" && p === "Jose-san") {
                // Sonido al entrar
                const loginSnd = document.getElementById('soundLogin');
                loginSnd.play().catch(err => console.log("Audio block:", err));
                
                document.getElementById('auth-screen').classList.add('auth-hidden');
                setTimeout(() => {
                    const dashboard = document.getElementById('app-screen');
                    dashboard.classList.remove('app-hidden');
                    dashboard.classList.add('app-visible');
                }, 600);
            } else {
                alert("Error de credenciales");
            }
        }
    </script>
</body>
</html>
