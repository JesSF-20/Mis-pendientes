<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincroTask | TICS Workspace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --accent: #3b82f6; --glass-bg: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b1120; color: #f1f5f9; overflow-x: hidden; }
        .fancy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.15) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(168, 85, 247, 0.15) 0px, transparent 50%); }
        .glass { background: var(--glass-bg); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-dark { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .task-card { animation: slideUp 0.4s ease-out forwards; transition: all 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo-floating { animation: floatingGlow 5s ease-in-out infinite; }
        @keyframes floatingGlow {
            0%, 100% { transform: translateY(0px); filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); }
            50% { transform: translateY(-15px); filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.7)); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        #auth-screen { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-hidden { transform: scale(0.9); opacity: 0; pointer-events: none; visibility: hidden; position: absolute; }
    </style>
</head>
<body class="min-h-screen">
    <div class="fancy-bg"></div>

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg rounded-[3rem] p-12 shadow-2xl animate__animated animate__zoomIn">
            <div class="text-center mb-10">
                <div class="h-64 w-64 mx-auto mb-8 flex items-center justify-center logo-floating">
                    <img id="loginPhoto" src="assets/logo_tics.jpeg" alt="Logo" class="max-w-full max-h-full object-contain rounded-3xl shadow-2xl">
                </div>
                <h1 class="text-4xl font-black text-white tracking-tighter">Jesús <span class="text-blue-500">Workspace</span></h1>
                <p class="text-gray-400 mt-2 font-medium">Control de Gestión TICS v3.0</p>
            </div>
            
            <form onsubmit="window.handleLogin(event)" class="space-y-5" novalidate>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-2">Usuario del Sistema</label>
                    <input type="text" id="loginUser" required placeholder="Nombre Completo" autocomplete="off"
                        class="w-full px-6 py-4 bg-black/40 border border-white/10 rounded-2xl text-white outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-2">Clave de Acceso</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" 
                        class="w-full px-6 py-4 bg-black/40 border border-white/10 rounded-2xl text-white outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
                <button type="submit" class="w-full py-4 mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-2xl shadow-xl shadow-blue-900/40 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="shield-check" class="w-5 h-5"></i> Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden opacity-0 h-screen w-full flex overflow-hidden transition-opacity duration-700">
        <aside class="w-80 glass-dark border-r border-white/5 flex flex-col p-8">
            <div class="flex items-center gap-4 mb-16">
                <div class="h-12 w-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i data-lucide="cpu" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <span class="block text-xl font-extrabold text-white leading-tight">SincroTask</span>
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Enterprise Edition</span>
                </div>
            </div>
            <nav class="space-y-2 flex-1">
                <a href="#" class="flex items-center gap-4 p-4 rounded-2xl bg-blue-500/10 text-blue-400 font-bold border border-blue-500/20">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                </a>
                <button onclick="location.reload()" class="w-full flex items-center gap-4 p-4 rounded-2xl text-red-400 hover:bg-red-500/10 transition-all font-bold mt-auto">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Cerrar Sesión
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-y-auto bg-slate-950/30">
            <header class="h-24 px-12 flex items-center justify-between sticky top-0 z-20 glass border-b border-white/5">
                <div class="flex items-center gap-4">
                    <img src="assets/logo_tics.jpeg" class="h-14 w-14 rounded-2xl object-contain border-2 border-blue-500/30 p-1 bg-black/20">
                    <div>
                        <h2 class="text-2xl font-black text-white">Hola, Jesús</h2>
                        <p class="text-xs text-gray-500 font-bold uppercase">Workspace Activo</p>
                    </div>
                </div>
            </header>

            <div class="p-12 space-y-12 max-w-7xl mx-auto w-full">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="glass p-8 rounded-[2.5rem]">
                        <p class="text-sm font-bold text-gray-400 uppercase mb-1">Por Hacer</p>
                        <h3 id="statPending" class="text-5xl font-black text-white">0</h3>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem]">
                        <p class="text-sm font-bold text-gray-400 uppercase mb-1">Hechas</p>
                        <h3 id="statDone" class="text-5xl font-black text-white">0</h3>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem]">
                        <p class="text-sm font-bold text-blue-400 uppercase mb-1">Rendimiento</p>
                        <h3 id="statEfficiency" class="text-5xl font-black text-white">0%</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                    <div class="lg:col-span-4">
                        <div class="glass p-8 rounded-[2.5rem]">
                            <h4 class="text-xl font-extrabold text-white mb-6">Nuevo Objetivo</h4>
                            <textarea id="taskInput" placeholder="¿Qué sigue?" class="w-full p-5 bg-black/20 border border-white/10 rounded-3xl text-white outline-none focus:border-blue-500 h-32 resize-none transition-all"></textarea>
                            <button onclick="addTask()" class="w-full py-5 mt-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl transition-all">Añadir</button>
                        </div>
                    </div>
                    <div class="lg:col-span-8">
                        <div id="taskList" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGh_Pesf7zkQF5yle0Jhd6lapZod06bnE",
            authDomain: "pendientes-jose.firebaseapp.com",
            projectId: "pendientes-jose",
            storageBucket: "pendientes-jose.firebasestorage.app",
            messagingSenderId: "36052420213",
            appId: "1:36052420213:web:b8dac50761aed5feec3d2c",
            databaseURL: "https://pendientes-jose-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tareas');

        onValue(tasksRef, (snapshot) => {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            const tasks = snapshot.val() || {};
            let p = 0, d = 0;

            Object.keys(tasks).reverse().forEach(id => {
                const task = tasks[id];
                task.done ? d++ : p++;
                const card = document.createElement('div');
                card.className = `task-card glass-dark p-6 rounded-[2rem] flex items-center justify-between ${task.done ? 'opacity-40 grayscale' : ''}`;
                card.innerHTML = `
                    <div class="flex items-center gap-6">
                        <button onclick="toggleTask('${id}', ${task.done})" class="w-10 h-10 rounded-2xl border-2 border-white/10 flex items-center justify-center transition-all ${task.done ? 'bg-blue-600' : 'bg-white/5'}">
                            ${task.done ? '<i data-lucide="check" class="text-white w-5 h-5"></i>' : ''}
                        </button>
                        <span class="text-lg font-bold text-white">${task.text}</span>
                    </div>
                    <button onclick="deleteTask('${id}')" class="text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                `;
                list.appendChild(card);
            });

            document.getElementById('statPending').innerText = p;
            document.getElementById('statDone').innerText = d;
            document.getElementById('statEfficiency').innerText = (p + d) === 0 ? "0%" : Math.round((d / (p + d)) * 100) + "%";
            lucide.createIcons();
        });

        window.addTask = () => {
            const input = document.getElementById('taskInput');
            if(input.value.trim()) push(tasksRef, { text: input.value, done: false });
            input.value = "";
        };
        window.toggleTask = (id, status) => update(ref(db, `tareas/${id}`), { done: !status });
        window.deleteTask = (id) => remove(ref(db, `tareas/${id}`));
    </script>

    <script>
        lucide.createIcons();
        window.handleLogin = (e) => {
            e.preventDefault();
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPassword').value;

            if(u === "Jesús Sánchez" && p === "Jose-san") {
                document.getElementById('auth-screen').classList.add('auth-hidden');
                setTimeout(() => {
                    const app = document.getElementById('app-screen');
                    app.classList.remove('hidden');
                    setTimeout(() => app.classList.add('opacity-100'), 50);
                }, 800);
            } else {
                alert("Acceso denegado");
            }
        };
    </script>
</body>
</html>
