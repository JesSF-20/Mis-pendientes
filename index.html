<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincroTask | The Ultimate TICS Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b1120; color: #f1f5f9; overflow-x: hidden; }
        .fancy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.15) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(168, 85, 247, 0.15) 0px, transparent 50%), radial-gradient(at 50% 90%, rgba(236, 72, 153, 0.1) 0px, transparent 50%); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .nav-link { transition: all 0.3s ease; position: relative; }
        .nav-link.active { background: rgba(59, 130, 246, 0.2); color: white; border-left: 3px solid var(--accent); }
        .task-item { animation: taskIn 0.4s ease-out forwards; }
        .task-done { opacity: 0.5; text-decoration: line-through; filter: grayscale(1); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .tag-work { background: #3b82f6; }
        .tag-urgent { background: #ef4444; }
        .tag-idea { background: #10b981; }
        #auth-screen { transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        #app-screen { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .app-visible { display: flex !important; opacity: 1 !important; }
        .auth-hidden { transform: scale(0.8) translateY(-100vh); opacity: 0; pointer-events: none; }
        @keyframes taskIn { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body class="min-h-screen">
    <div class="fancy-bg"></div>

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg rounded-3xl p-10 shadow-2xl shadow-blue-900/20 animate__animated animate__zoomIn">
            <div class="text-center mb-10">
                <div class="h-20 w-20 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-3xl flex items-center justify-center shadow-lg shadow-blue-500/30 mx-auto mb-6 transform rotate-6">
                    <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-4xl font-extrabold text-white tracking-tighter">Jesús <span class="text-blue-500">Workspace</span></h1>
                <p class="text-gray-400 mt-2">Ingresa a tu Workspace Seguro</p>
            </div>
            
            <form onsubmit="window.handleLogin(event)" class="space-y-6">
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                    <input type="text" id="loginUser" required placeholder="Usuario" class="w-full pl-12 pr-4 py-4 bg-gray-900/50 border border-gray-700 rounded-xl outline-none text-white focus:border-blue-500 transition-colors">
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                    <input type="password" id="loginPassword" required placeholder="Contraseña" class="w-full pl-12 pr-4 py-4 bg-gray-900/50 border border-gray-700 rounded-xl outline-none text-white focus:border-blue-500 transition-colors">
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-3">
                    <i data-lucide="log-in" class="w-5 h-5"></i> Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="h-screen w-full flex overflow-hidden">
        <aside class="w-72 glass-dark border-r border-white/5 flex flex-col p-6">
            <div class="flex items-center gap-3 mb-12">
                <div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center"><i data-lucide="layers" class="text-white w-5 h-5"></i></div>
                <span class="text-xl font-bold text-white">SincroTask <span class="text-blue-500 text-sm font-medium">X</span></span>
            </div>
            <nav class="space-y-3 flex-1">
                <a href="#" class="nav-link active flex items-center gap-3.5 p-4 rounded-xl text-gray-300"><i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard</a>
                <button onclick="handleLogout()" class="w-full mt-10 text-sm text-red-400 hover:text-red-300 flex items-center gap-1.5 p-4"><i data-lucide="log-out" class="w-4 h-4"></i> Salir</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col h-screen">
            <header class="h-20 glass border-b border-white/5 px-8 flex items-center justify-between">
                <div class="relative w-96">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                    <input type="text" placeholder="Buscar tarea..." class="w-full pl-12 pr-4 py-2.5 bg-gray-900 rounded-xl border border-gray-700 text-gray-300 outline-none">
                </div>
                <div class="flex items-center gap-3">
                    <img id="userAvatar" src="" alt="Avatar" class="h-10 w-10 rounded-full bg-blue-100 border-2 border-white/10">
                    <span id="userName" class="text-sm font-semibold text-white">Admin</span>
                </div>
            </header>

            <div class="flex-1 p-8 overflow-y-auto custom-scroll">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h2 class="text-3xl font-extrabold text-white">Bienvenido, <span id="welcomeName">Jesús</span> 👋</h2>
                        <p class="text-gray-400 mt-1">Cloud Sync Status: <span class="text-green-500">Connected</span></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass p-6 rounded-3xl flex items-center gap-5">
                        <div class="h-14 w-14 bg-yellow-950/50 rounded-full flex items-center justify-center text-yellow-400"><i data-lucide="clock-3" class="w-7 h-7"></i></div>
                        <div><p class="text-xs text-gray-400 uppercase font-bold">Pendientes</p><h3 id="statPending" class="text-3xl font-extrabold text-white">0</h3></div>
                    </div>
                    <div class="glass p-6 rounded-3xl flex items-center gap-5">
                        <div class="h-14 w-14 bg-green-950/50 rounded-full flex items-center justify-center text-green-400"><i data-lucide="check-circle-2" class="w-7 h-7"></i></div>
                        <div><p class="text-xs text-gray-400 uppercase font-bold">Hechas</p><h3 id="statDone" class="text-3xl font-extrabold text-white">0</h3></div>
                    </div>
                    <div class="glass p-6 rounded-3xl flex items-center gap-5">
                        <div class="h-14 w-14 bg-purple-950/50 rounded-full flex items-center justify-center text-purple-400"><i data-lucide="award" class="w-7 h-7"></i></div>
                        <div><p class="text-xs text-gray-400 uppercase font-bold">Eficiencia</p><h3 id="statEfficiency" class="text-3xl font-extrabold text-white">0%</h3></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    <div class="xl:col-span-1 glass p-7 rounded-3xl h-fit">
                        <h4 class="text-lg font-bold text-white mb-5 flex items-center gap-2"><i data-lucide="pen-tool" class="w-5 h-5 text-blue-500"></i> Añadir Objetivo</h4>
                        <input type="text" id="taskInput" placeholder="Ej: Proyecto Digital Animation..." class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl text-white outline-none mb-4">
                        <div class="grid grid-cols-3 gap-2 mb-6">
                            <button onclick="setActiveTag('work', this)" class="tag-btn tag-work text-[10px] text-white font-bold p-2 rounded-lg" data-tag="work">TRABAJO</button>
                            <button onclick="setActiveTag('urgent', this)" class="tag-btn tag-urgent text-[10px] text-white font-bold p-2 rounded-lg opacity-50" data-tag="urgent">URGENTE</button>
                            <button onclick="setActiveTag('idea', this)" class="tag-btn tag-idea text-[10px] text-white font-bold p-2 rounded-lg opacity-50" data-tag="idea">IDEA</button>
                        </div>
                        <button onclick="addTask()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> Crear Tarea
                        </button>
                    </div>

                    <div class="xl:col-span-2 glass p-7 rounded-3xl">
                        <h4 class="text-lg font-bold text-white mb-6">Flujo de Trabajo (Realtime)</h4>
                        <ul id="taskList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGh_Pesf7zkQF5yle0Jhd6lapZod06bnE",
            authDomain: "pendientes-jose.firebaseapp.com",
            projectId: "pendientes-jose",
            storageBucket: "pendientes-jose.firebasestorage.app",
            messagingSenderId: "36052420213",
            appId: "1:36052420213:web:b8dac50761aed5feec3d2c",
            databaseURL: "https://pendientes-jose-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tareas');

        let currentTag = 'work';
        let tasksData = {};

        onValue(tasksRef, (snapshot) => {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            tasksData = snapshot.val() || {};
            Object.keys(tasksData).reverse().forEach(id => renderTask(id, tasksData[id]));
            updateStats();
            lucide.createIcons();
        });

        window.addTask = function() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;
            push(tasksRef, { text, done: false, tag: currentTag, timestamp: Date.now() });
            input.value = "";
        };

        function renderTask(id, task) {
            const list = document.getElementById('taskList');
            const li = document.createElement('li');
            li.className = `task-item glass-dark p-5 rounded-2xl flex items-center justify-between group ${task.done ? 'task-done' : ''}`;
            const tags = {
                work: { color: 'tag-work', label: 'Trabajo' },
                urgent: { color: 'tag-urgent', label: 'Urgente' },
                idea: { color: 'tag-idea', label: 'Idea' }
            };
            const t = tags[task.tag];
            li.innerHTML = `
                <div class="flex items-center gap-4">
                    <button onclick="toggleTask('${id}', ${task.done})" class="w-6 h-6 border-2 border-gray-600 rounded-lg bg-gray-900 flex items-center justify-center">
                        <i data-lucide="check" class="w-4 h-4 text-blue-500 ${task.done ? '' : 'hidden'}"></i>
                    </button>
                    <div>
                        <span class="text-white font-medium">${task.text}</span>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="${t.color} text-[8px] font-bold px-1.5 py-0.5 rounded text-white uppercase">${t.label}</span>
                        </div>
                    </div>
                </div>
                <button onclick="deleteTask('${id}')" class="opacity-0 group-hover:opacity-100 p-2 text-red-500 hover:bg-red-900/20 rounded-lg transition-all">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;
            list.appendChild(li);
        }

        window.toggleTask = (id, currentStatus) => update(ref(db, `tareas/${id}`), { done: !currentStatus });
        window.deleteTask = (id) => { if(confirm("¿Eliminar tarea?")) remove(ref(db, `tareas/${id}`)); };
        window.setActiveTag = (tag, btn) => {
            currentTag = tag;
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.add('opacity-50'));
            btn.classList.remove('opacity-50');
        };

        function updateStats() {
            const keys = Object.keys(tasksData);
            const total = keys.length;
            const done = keys.filter(k => tasksData[k].done).length;
            document.getElementById('statPending').innerText = total - done;
            document.getElementById('statDone').innerText = done;
            document.getElementById('statEfficiency').innerText = total === 0 ? "0%" : Math.round((done / total) * 100) + "%";
        }
    </script>

    <script>
        lucide.createIcons();

        window.handleLogin = function(e) {
            e.preventDefault();
            const userVal = document.getElementById('loginUser').value;
            const passVal = document.getElementById('loginPassword').value;

            // TUS CREDENCIALES
            const miUsuario = "Jesús Sánchez"; 
            const miPass = "Jose-san";

            if(userVal === miUsuario && passVal === miPass) {
                document.getElementById('auth-screen').classList.add('auth-hidden');
                setTimeout(() => {
                    document.getElementById('app-screen').classList.add('app-visible');
                    document.getElementById('userName').innerText = miUsuario;
                    document.getElementById('welcomeName').innerText = "Jesús";
                    document.getElementById('userAvatar').src = `https://api.dicebear.com/8.x/notionists/svg?seed=${miUsuario}`;
                }, 400);
            } else {
                alert("Acceso incorrecto. Verifica tus datos.");
            }
        };

        function handleLogout() { location.reload(); }
    </script>
</body>
</html>
