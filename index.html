<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincroTask Pro | Ultimate Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .task-done {
            text-decoration: line-through;
            opacity: 0.6;
            filter: grayscale(1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-2xl animate__animated animate__fadeIn">
        
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="glass-card p-4 rounded-3xl text-center shadow-xl">
                <p class="text-[10px] font-bold uppercase text-blue-600">Total</p>
                <h3 id="totalTasks" class="text-2xl font-bold text-gray-800">0</h3>
            </div>
            <div class="glass-card p-4 rounded-3xl text-center shadow-xl">
                <p class="text-[10px] font-bold uppercase text-green-600">Completas</p>
                <h3 id="completedTasks" class="text-2xl font-bold text-gray-800">0</h3>
            </div>
            <div class="glass-card p-4 rounded-3xl text-center shadow-xl">
                <p class="text-[10px] font-bold uppercase text-purple-600">Progreso</p>
                <h3 id="progressPercent" class="text-2xl font-bold text-gray-800">0%</h3>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] shadow-2xl overflow-hidden border-none">
            
            <div class="p-8 bg-white/40 border-b border-white/20">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Lista de Pendientes</h1>
                            <span class="px-2 py-0.5 bg-black text-white text-[10px] rounded-full font-bold">PRO</span>
                        </div>
                        <p class="text-gray-500 text-sm mt-1 flex items-center gap-1">
                            <i data-lucide="zap" class="w-3 h-3 text-yellow-500 fill-yellow-500"></i>
                            Potenciando tu flujo de trabajo
                        </p>
                    </div>
                    <div class="h-14 w-14 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition-transform cursor-pointer">
                        <i data-lucide="layers" class="text-white"></i>
                    </div>
                </div>
            </div>

            <div class="p-8 pb-4">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input type="text" id="taskInput" onkeypress="handleKeyPress(event)" placeholder="¿Qué vamos a lograr hoy?" 
                        class="w-full pl-12 pr-32 py-5 bg-white/50 border-2 border-transparent focus:border-blue-400/50 rounded-2xl focus:ring-0 transition-all outline-none text-gray-700 placeholder-gray-400 shadow-inner">
                    <button onclick="addTask()" class="absolute right-2.5 top-2.5 bottom-2.5 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all active:scale-95 flex items-center gap-2 shadow-lg shadow-blue-200">
                        Añadir
                    </button>
                </div>
            </div>

            <ul id="taskList" class="p-8 pt-4 space-y-4 max-h-[400px] overflow-y-auto custom-scrollbar min-h-[200px]">
                <div id="emptyState" class="text-center py-12 animate__animated animate__fadeIn">
                    <div class="w-20 h-20 bg-blue-100/50 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white">
                        <i data-lucide="clipboard-list" class="w-10 h-10 text-blue-400"></i>
                    </div>
                    <h4 class="text-gray-800 font-semibold">Bandeja de entrada limpia</h4>
                    <p class="text-gray-500 text-sm">No tienes tareas para este momento.</p>
                </div>
            </ul>

            <div class="px-8 py-5 bg-white/30 flex justify-between items-center border-t border-white/20">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                        <div class="absolute inset-0 w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
                    </div>
                    <span class="text-xs font-bold text-gray-600 uppercase tracking-tighter">Live Sync Engine</span>
                </div>
                <button onclick="clearCompleted()" class="text-xs font-bold text-red-500 hover:text-red-700 transition-colors uppercase">Limpiar completadas</button>
            </div>
        </div>
    </div>

    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // Configuración de tu proyecto (Copiado de tu captura)
  const firebaseConfig = {
    apiKey: "AIzaSyDGh_Pesf7zkQF5yLe0Jhd6lapZodO6bnE",
    authDomain: "pendientes-jose.firebaseapp.com",
    projectId: "pendientes-jose",
    storageBucket: "pendientes-jose.firebasestorage.app",
    messagingSenderId: "360524230213",
    appId: "1:360524230213:web:b8dac50761aed5feec3d2c",
    databaseURL: "https://pendientes-jose-default-rtdb.firebaseio.com" 
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  const tasksRef = ref(database, 'tasks');

  // Inicializar iconos de Lucide
  lucide.createIcons();

  let tasks = [];

  // --- ESCUCHAR CAMBIOS (SINCRONIZACIÓN) ---
  onValue(tasksRef, (snapshot) => {
    const data = snapshot.val();
    const list = document.getElementById('taskList');
    list.innerHTML = ""; 
    tasks = [];

    if (data) {
      Object.keys(data).forEach(id => {
        const task = { id, ...data[id] };
        tasks.push(task);
        renderTask(task);
      });
    }
    updateStats();
    lucide.createIcons(); // Refrescar iconos
  });

  // --- FUNCIONES GLOBALES ---
  window.handleKeyPress = (e) => {
    if (e.key === 'Enter') addTask();
  };

  window.addTask = () => {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (text === "") return;

    push(tasksRef, {
      text: text,
      done: false
    });
    input.value = "";
  };

  window.toggleTask = (id) => {
    const task = tasks.find(t => t.id === id);
    const taskRef = ref(database, `tasks/${id}`);
    update(taskRef, { done: !task.done });
  };

  window.deleteTask = (id) => {
    const taskRef = ref(database, `tasks/${id}`);
    remove(taskRef);
  };

  window.clearCompleted = () => {
    const completed = tasks.filter(t => t.done);
    completed.forEach(t => {
      const taskRef = ref(database, `tasks/${t.id}`);
      remove(taskRef);
    });
  };

  // --- RENDERIZADO Y ESTADÍSTICAS ---
  function renderTask(task) {
    const list = document.getElementById('taskList');
    const li = document.createElement('li');
    li.id = `task-${task.id}`;
    li.className = `flex items-center justify-between p-4 bg-white/80 rounded-2xl border border-white shadow-sm hover:shadow-md transition-all group animate__animated animate__fadeInRight`;
    
    li.innerHTML = `
        <div class="flex items-center gap-4 flex-1 cursor-pointer" onclick="toggleTask('${task.id}')">
            <div class="flex items-center justify-center w-6 h-6 border-2 ${task.done ? 'bg-blue-600 border-blue-600' : 'border-blue-200'} rounded-lg transition-colors">
                <i data-lucide="check" class="w-4 h-4 text-white ${task.done ? '' : 'hidden'}"></i>
            </div>
            <span class="text-gray-700 font-medium ${task.done ? 'task-done' : ''}">${task.text}</span>
        </div>
        <button onclick="deleteTask('${task.id}')" class="p-2 text-gray-300 hover:text-red-500 transition-all">
            <i data-lucide="trash-2" class="w-5 h-5"></i>
        </button>
    `;
    list.appendChild(li);
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

    document.getElementById('totalTasks').innerText = total;
    document.getElementById('completedTasks').innerText = completed;
    document.getElementById('progressPercent').innerText = `${percent}%`;
    
    const emptyState = document.getElementById('emptyState');
    if (total > 0) {
        if (emptyState) emptyState.style.display = 'none';
    } else {
        if (emptyState) emptyState.style.display = 'block';
    }
  }
  // Exponer funciones al objeto window para que los botones del HTML puedan verlas
window.addTask = addTask;
window.handleKeyPress = handleKeyPress;
window.toggleTask = toggleTask;
window.deleteTask = deleteTask;
window.clearCompleted = clearCompleted;
</script>
</body>
</html>
